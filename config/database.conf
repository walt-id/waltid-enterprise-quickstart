# Default datbase configuration

databaseType = mongodb

# Recommended storage driver that stores data in MongoDB. MongoDB Community Edition is supported.
mongodb = {
    # Refer to https://www.mongodb.com/docs/manual/reference/connection-string/
    connectionString = "mongodb://root:password@mongodb:27017/?&replicaSet=rs0"

    # For AWS DocumentDB, ensure retryWrites is set to false.
    # connectionString = "mongodb://root:password@localhost:27017?replicaSet=rs0&directConnection=true&retryWrites=false"

    # Connection String quick reference:
    # - if username/password contain special characters, they must be converted with percent encoding (RFC3986 2.1)
    #
    # Format: mongodb+srv://[username:password@]host[/[defaultauthdb][?options]]
    #
    # EXAMPLES:
    #
    # Standard:
    # 1. Standalone:   mongodb://user:password@host:port/
    # 2. Shared cluster: mongodb://user:password@host1:port1,host2:port2,host3:port3/   (`mongos` hosts in connection string)
    # 3. Replica set: mongodb://user:password@host1:port1,host2:port2,host3:port3/?&replicaSet=replicaSetName
    #
    # SRV format (see https://www.mongodb.com/docs/manual/reference/connection-string/#std-label-connections-dns-seedlist)
    # "DNS-constructed seed list to construct available servers list"
    # Examples: same as above, with `mongodb+srv://` instead of `mongodb://`

    # Database name
    database = "waltid-enterprise"

    # Database profile - determines feature capabilities
    # Options:
    #   MongoDB:        MONGODB_5, MONGODB_6, MONGODB_7, MONGODB_8 (recommended)
    #   AWS DocumentDB: AWS_DOCUMENTDB_4, AWS_DOCUMENTDB_5, AWS_DOCUMENTDB_8
    #   Azure CosmosDB: AZURE_COSMOSDB_4, AZURE_COSMOSDB_6, AZURE_COSMOSDB_7
    #   Custom:         CUSTOM (requires dbFeatures configuration)
    profile = MONGODB_8

    # Optional: Override collation from profile (set to "none" to disable)
    # collation = "en"

    # Only used when profile = CUSTOM
    # dbFeatures = {
    #     cursorWithinTransaction = true
    #     collationSupported = true
    #     multiDocumentTransactions = true
    #     changeStreams = true
    #     maxTransactionLogBytes = 0
    # }

    # Connection pool configuration (defaults shown below)
    # Enabled by default - adjust values based on your deployment size and expected load
    pool = {
        # Maximum number of connections in the pool
        maxSize = 100
        
        # Minimum number of connections to maintain (warm pool for faster response times)
        minSize = 10
        
        # Maximum time to wait for an available connection in milliseconds (fail fast)
        maxWaitTimeMs = 5000
        
        # Maximum time a connection can remain idle before being closed (in milliseconds)
        # Default: 60000 (1 minute)
        maxConnectionIdleTimeMs = 60000
        
        # Maximum lifetime of a connection in milliseconds (connections are recycled after this time)
        # Default: 1800000 (30 minutes)
        maxConnectionLifeTimeMs = 1800000
    }

    ssl = {
        # To enable SSL
        enable = false

        # Location of the JKS trust store file
        trustStoreLocation = ""

        # Trust store password
        trustStorePassword = ""

        # Toggle SSL certificate host name validation
        invalidHostNameAllowed = false
    }
}

