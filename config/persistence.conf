# Default ES persistence mode, currently used for issuer2 rate limiting.
#
# type = "memory" is the existing shared persistence library default.
# For issuer2 rate limiting it means no Redis is configured:
# - Basic issuer2 Ktor request rate limiting still works.
# - Issuer2 progressive failure backoff is disabled.
# - Issuer2 failure counters are not stored in memory.
# - Ktor's basic in-process request counters are not shared across ES instances.
# - Restarting the ES service clears Ktor's in-process request counters.
# For production-safe issuer2 progressive failure backoff across clustered ES
# deployments, configure Redis below.
#
# With type = "redis" or type = "redis-cluster":
# - Issuer2 progressive failure backoff is enabled.
# - Failed /openid4vci/token and /openid4vci/credential attempts are counted in Redis.
# - Repeated failures from the same source IP and issuer target are temporarily blocked.
# - Blocked requests return 429 Too Many Requests with a Retry-After header.
# - Backoff state is shared across ES instances using the same Redis deployment.
#
# type = "redis"
# nodes = [
#   { host = "redis", port = 6379 }
# ]
#
# Optional Redis authentication:
# user = "default"
# password = "change-me"
#
# Redis cluster example:
# type = "redis-cluster"
# nodes = [
#   { host = "redis-node-1", port = 6379 },
#   { host = "redis-node-2", port = 6379 },
#   { host = "redis-node-3", port = 6379 }
# ]
