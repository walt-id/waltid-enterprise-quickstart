# Issuer2 OpenID4VCI rate-limit defaults.
#
# Basic request-volume limits are always applied by Ktor per issuer target,
# endpoint, and source IP as observed by the ES runtime.
#
# Progressive failure backoff is applied only when Redis is configured through
# persistence.conf. It is shared across ES instances using the same Redis
# deployment.

token {
  requestsPerMinute = 5
  failureWindowSeconds = 60
  failureThreshold = 5
  failureBlockSeconds = 300
}

credential {
  requestsPerMinute = 10
  failureWindowSeconds = 60
  failureThreshold = 5
  failureBlockSeconds = 300
}
